<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0d1117">
<title>Garden Weather</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#30363d;
    --ink:#e6edf3; --muted:#8b949e;
    --temp:#ff8f5e; --dew:#4fd1c5; --hum:#58a6ff; --pres:#bc8cff;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; padding:16px; max-width:960px; margin:0 auto;
  }
  header{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:14px}
  h1{font-size:20px; margin:0; font-weight:650; letter-spacing:.2px}
  h1 .leaf{margin-right:6px}
  #updated{color:var(--muted); font-size:13px}
  #updated.stale{color:var(--temp)}
  .tiles{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px}
  @media(max-width:560px){.tiles{grid-template-columns:repeat(2,1fr)}}
  .tile{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px}
  .tile .label{color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.6px}
  .tile .val{font-size:26px; font-weight:680; margin-top:4px; font-variant-numeric:tabular-nums}
  .tile .sub{color:var(--muted); font-size:12px; margin-top:2px; font-variant-numeric:tabular-nums}
  .tile.temp .val{color:var(--temp)} .tile.hum .val{color:var(--hum)}
  .tile.pres .val{color:var(--pres)} .tile.dew .val{color:var(--dew)}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px}
  .ranges{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap}
  .ranges button{
    background:var(--panel2); color:var(--muted); border:1px solid var(--line);
    border-radius:999px; padding:6px 14px; font-size:13px; cursor:pointer; transition:.15s;
  }
  .ranges button:hover{color:var(--ink)}
  .ranges button.active{background:var(--hum); border-color:var(--hum); color:#04122b; font-weight:600}
  .chart-wrap{position:relative; height:min(52vh,420px)}
  #empty{display:none; text-align:center; color:var(--muted); padding:48px 12px}
  footer{color:var(--muted); font-size:12px; text-align:center; margin-top:18px}
  footer a{color:var(--hum); text-decoration:none}
</style>
</head>
<body>
<header>
  <h1><span class="leaf">🌱</span>Garden Weather</h1>
  <span id="updated">loading…</span>
</header>

<div class="tiles">
  <div class="tile temp"><div class="label">Temperature</div><div class="val" id="t-temp">–</div><div class="sub" id="t-tempf"></div></div>
  <div class="tile hum"><div class="label">Humidity</div><div class="val" id="t-hum">–</div><div class="sub">dew pt <span id="t-dew2"></span></div></div>
  <div class="tile pres"><div class="label">Pressure</div><div class="val" id="t-pres">–</div><div class="sub" id="t-presst"></div></div>
  <div class="tile dew"><div class="label">Dew point</div><div class="val" id="t-dew">–</div><div class="sub">heat idx <span id="t-hi"></span></div></div>
</div>

<div class="card">
  <div class="ranges" id="ranges">
    <button data-h="6">6 h</button>
    <button data-h="24" class="active">24 h</button>
    <button data-h="168">7 d</button>
    <button data-h="0">All</button>
  </div>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div id="empty">No readings yet — waiting for the first upload from <code>home-pi</code>.</div>
</div>

<footer>
  Updates every 5 min from a Raspberry Pi + SensorPush HTP.xw · also on
  <a href="https://www.wunderground.com" rel="noopener">Weather Underground</a> ·
  <a href="https://raw.githubusercontent.com/garnathan/wunderground-killi/main/data/recent.json">recent.json</a> · <a href="https://raw.githubusercontent.com/garnathan/wunderground-killi/main/latest.json">latest.json</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
const C = getComputedStyle(document.documentElement);
const COL = k => C.getPropertyValue('--'+k).trim();
let chart, rangeH = 24, all = [];
const RAW = 'https://raw.githubusercontent.com/garnathan/wunderground-killi/main/'; // site is served from the gh-pages branch; live data lives on main

function fmtAgo(sec){
  const s = Math.max(0, Math.floor(Date.now()/1000 - sec));
  if (s < 90) return s+'s ago';
  if (s < 5400) return Math.round(s/60)+'m ago';
  return Math.round(s/3600)+'h ago';
}

function paintTiles(d){
  if(!d || d.temperature_c==null) return;
  const set=(id,v)=>document.getElementById(id).textContent=v;
  set('t-temp', d.temperature_c.toFixed(1)+' °C');
  set('t-tempf', (d.temperature_f!=null? d.temperature_f.toFixed(1)+' °F':''));
  set('t-hum', d.humidity_pct.toFixed(0)+' %');
  set('t-dew2', d.dew_point_c!=null? d.dew_point_c.toFixed(1)+' °C':'');
  set('t-pres', (d.pressure_sealevel_mbar??d.pressure_station_mbar).toFixed(1)+' mb');
  set('t-presst', d.pressure_station_mbar!=null? d.pressure_station_mbar.toFixed(1)+' mb station':'');
  set('t-dew', d.dew_point_c!=null? d.dew_point_c.toFixed(1)+' °C':'–');
  set('t-hi', d.heat_index_c!=null? d.heat_index_c.toFixed(1)+' °C':'');
  const u = document.getElementById('updated');
  const epoch = d.epoch ?? (d.ts? Date.parse(d.ts)/1000 : null);
  if(epoch){ u.textContent='updated '+fmtAgo(epoch); u.classList.toggle('stale', (Date.now()/1000-epoch)>1800); }
}

function series(rows, key){ return rows.map(r=>({x:(r.epoch??Date.parse(r.ts)/1000)*1000, y:r[key]})); }

function draw(){
  const cut = rangeH? Date.now()/1000 - rangeH*3600 : 0;
  const rows = all.filter(r => (r.epoch??Date.parse(r.ts)/1000) >= cut);
  document.getElementById('empty').style.display = rows.length? 'none':'block';
  const ds = [
    {label:'Temp °C', key:'temperature_c', color:COL('temp'), axis:'y'},
    {label:'Dew °C', key:'dew_point_c', color:COL('dew'), axis:'y'},
    {label:'Humidity %', key:'humidity_pct', color:COL('hum'), axis:'y1'},
    {label:'Pressure mb', key:'pressure_sealevel_mbar', color:COL('pres'), axis:'y2'},
  ].map(s=>({
    label:s.label, data:series(rows,s.key), yAxisID:s.axis,
    borderColor:s.color, backgroundColor:s.color, tension:.3,
    borderWidth:2, pointRadius:0, pointHoverRadius:4, spanGaps:true,
  }));
  const axis = (id,pos,show)=>({type:'linear',position:pos,display:show,grid:{color:COL('line'),drawOnChartArea:id==='y'},ticks:{color:COL('muted')}});
  const cfg = {
    type:'line',
    data:{datasets:ds},
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      interaction:{mode:'index', intersect:false},
      scales:{
        x:{type:'time', time:{tooltipFormat:'PP HH:mm'}, grid:{color:COL('line')}, ticks:{color:COL('muted'), maxRotation:0, autoSkipPadding:24}},
        y:axis('y','left',true), y1:axis('y1','right',true), y2:axis('y2','right',false),
      },
      plugins:{
        legend:{labels:{color:COL('ink'), usePointStyle:true, boxWidth:8}},
        tooltip:{backgroundColor:COL('panel2'), borderColor:COL('line'), borderWidth:1}
      }
    }
  };
  if(chart){ chart.data=cfg.data; chart.options=cfg.options; chart.update(); }
  else chart = new Chart(document.getElementById('chart'), cfg);
}

async function load(){
  const bust = '?t='+Date.now();
  try{
    const [recent, latest] = await Promise.all([
      fetch(RAW+'data/recent.json'+bust).then(r=>r.ok?r.json():[]).catch(()=>[]),
      fetch(RAW+'latest.json'+bust).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    all = Array.isArray(recent)? recent : [];
    paintTiles(latest && latest.temperature_c!=null ? latest : all[all.length-1]);
    draw();
  }catch(e){ console.error(e); }
}

document.getElementById('ranges').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  rangeH = +b.dataset.h;
  document.querySelectorAll('#ranges button').forEach(x=>x.classList.toggle('active', x===b));
  draw();
});

load();
setInterval(load, 180000); // refresh every 3 min
</script>
</body>
</html>
